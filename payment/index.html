<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <title>Payroll Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f4f6f8;
      color: #1a1a2e;
      padding: 24px;
    }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    /* ── Controls ── */
    .controls {
      background: #fff;
      border: 1px solid #dde1e7;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .controls label { font-weight: 600; margin-right: 4px; }
    .controls select, .controls input {
      border: 1px solid #ccd0d5;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #1d4ed8; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:not(:disabled):hover { background: #15803d; }
    .btn-ghost   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-ghost:not(:disabled):hover { background: #e2e8f0; }

    /* ── Status bar ── */
    #status {
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-weight: 500;
      display: none;
    }
    #status.info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; display: block; }
    #status.error   { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; display: block; }
    #status.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; display: block; }

    /* ── Step panels ── */
    .panel {
      background: #fff;
      border: 1px solid #dde1e7;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
    }
    .panel-header:hover { background: #f8fafc; }
    .step-badge {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #475569;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-badge.ok   { background: #dcfce7; color: #15803d; }
    .step-badge.warn { background: #fef9c3; color: #854d0e; }
    .step-badge.err  { background: #fee2e2; color: #b91c1c; }
    .panel-meta { margin-left: auto; font-size: 12px; color: #64748b; font-weight: 400; }
    .chevron { margin-left: 8px; font-size: 10px; color: #94a3b8; transition: transform .2s; }
    .panel.open .chevron { transform: rotate(180deg); }
    .panel-body { display: none; border-top: 1px solid #e8ebef; padding: 16px; overflow-x: auto; }
    .panel.open .panel-body { display: block; }

    /* ── Tables ── */
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th { background: #f8fafc; font-weight: 600; text-align: left; padding: 7px 10px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .num { text-align: right; }
    .neg { color: #b91c1c; }
    .pos { color: #15803d; }
    .warn-row td { background: #fffbeb; }
    .err-row  td { background: #fef2f2; }
    .total-row td { font-weight: 700; background: #f8fafc; border-top: 2px solid #e2e8f0; }

    /* ── Tests ── */
    .test-result { display: flex; gap: 8px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    .test-result:last-child { border-bottom: none; }
    .test-icon { font-size: 15px; width: 20px; flex-shrink: 0; }
    .test-name { font-weight: 500; }
    .test-detail { color: #ef4444; font-size: 12px; margin-top: 2px; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #93c5fd; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Boba Rabbit — Payroll Calculator</h1>

<div class="controls">
  <div>
    <label for="selMonth">Month</label>
    <select id="selMonth"></select>
  </div>
  <div>
    <label for="selYear">Year</label>
    <input id="selYear" type="number" value="2026" min="2020" max="2100" style="width:80px">
  </div>
  <button class="btn btn-ghost"   id="btnTests" onclick="runTests()">Run Tests</button>
  <button class="btn btn-primary" id="btnCalc"  onclick="calculate()">Calculate</button>
  <button class="btn btn-success" id="btnWrite" onclick="writeSheets()" disabled>Write to Sheets</button>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
// ── Month selector ────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const sel = document.getElementById('selMonth');
MONTHS.forEach((m, i) => {
  const opt = document.createElement('option');
  opt.value = i + 1;
  opt.textContent = m;
  sel.appendChild(opt);
});
sel.value = new Date().getMonth() + 1;


// ── Helpers ───────────────────────────────────────────────────
function status(msg, type = 'info') {
  const el = document.getElementById('status');
  el.className = type;
  el.innerHTML = msg;
}

function loading(msg) {
  status(`<span class="spinner"></span>${msg}`, 'info');
}

function fmt(n) { return (n || 0).toLocaleString('en-US'); }
function fmtDiff(n) {
  if (!n) return '<span>0</span>';
  return n > 0
    ? `<span class="pos">+${fmt(n)}</span>`
    : `<span class="neg">${fmt(n)}</span>`;
}

function panel(stepNum, title, badgeClass, meta, bodyHtml) {
  return `
    <div class="panel" id="panel-${stepNum}">
      <div class="panel-header" onclick="togglePanel(${stepNum})">
        <span class="step-badge ${badgeClass}">${stepNum}</span>
        <span>${title}</span>
        <span class="panel-meta">${meta}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="panel-body">${bodyHtml}</div>
    </div>`;
}

function togglePanel(n) {
  document.getElementById(`panel-${n}`).classList.toggle('open');
}

function openPanel(n) {
  document.getElementById(`panel-${n}`).classList.add('open');
}


// ── Tests ─────────────────────────────────────────────────────
function runTests() {
  loading('Running tests…');
  setButtons(true);
  google.script.run
    .withSuccessHandler(onTestsDone)
    .withFailureHandler(onError)
    .apiRunTests();
}

function onTestsDone(resp) {
  setButtons(false);
  if (!resp.ok) { status('Error: ' + resp.error, 'error'); return; }

  const results   = resp.results;
  const passed    = results.filter(r => r.passed).length;
  const allPassed = passed === results.length;

  status(`Tests: ${passed}/${results.length} passed`, allPassed ? 'success' : 'error');

  const rows = results.map(r => `
    <div class="test-result">
      <span class="test-icon">${r.passed ? '✅' : '❌'}</span>
      <div>
        <div class="test-name">${r.name}</div>
        ${(r.details||[]).map(d => `<div class="test-detail">${d}</div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('results').innerHTML =
    panel('T', 'Test Results', allPassed ? 'ok' : 'err', `${passed}/${results.length}`,
      `<div>${rows}</div>`);
  openPanel('T');
}


// ── Calculate ─────────────────────────────────────────────────
function calculate() {
  const month = parseInt(document.getElementById('selMonth').value);
  const year  = parseInt(document.getElementById('selYear').value);
  loading('Loading data and calculating…');
  setButtons(true);
  google.script.run
    .withSuccessHandler(resp => onCalcDone(resp, month, year))
    .withFailureHandler(onError)
    .apiCalculate(month, year);
}

function onCalcDone(resp, month, year) {
  setButtons(false);
  if (!resp.ok) { status('Error: ' + resp.error, 'error'); return; }

  const s = resp.steps;
  const warnCount = s.schedule.warnings.length + s.matching.unmatchedCount;
  status(`Done: ${s.payroll.count} employees, ${warnCount} warning(s)`,
         warnCount ? 'info' : 'success');

  document.getElementById('btnWrite').disabled = false;
  document.getElementById('results').innerHTML = [
    renderSchedulePanel(s.schedule),
    renderMatchingPanel(s.matching, s.bonuses, s.paid),
    renderH1Panel(s.payroll.data),
    renderH2Panel(s.payroll.data),
    renderVerificationPanel(s.verification),
  ].join('');
}

// ── Write ─────────────────────────────────────────────────────
function writeSheets() {
  const month = parseInt(document.getElementById('selMonth').value);
  const year  = parseInt(document.getElementById('selYear').value);
  loading('Writing to sheets…');
  setButtons(true);
  google.script.run
    .withSuccessHandler(onWriteDone)
    .withFailureHandler(onError)
    .apiWrite(month, year);
}

function onWriteDone(resp) {
  setButtons(false);
  if (!resp.ok) { status('Write error: ' + resp.error, 'error'); return; }
  status(`Written: ${resp.paymentRows} rows to Payment, ${resp.verificationRows} rows to Verification`, 'success');
}

function onError(err) {
  setButtons(false);
  status('Error: ' + (err.message || err), 'error');
}

function setButtons(disabled) {
  ['btnTests','btnCalc','btnWrite'].forEach(id => {
    if (id === 'btnWrite' && !disabled) return;
    document.getElementById(id).disabled = disabled;
  });
}


// ── Panel renderers ───────────────────────────────────────────

function renderSchedulePanel(sched) {
  const hasWarn = sched.warnings.length > 0;
  const warnHtml = hasWarn
    ? `<div style="margin-bottom:12px;color:#854d0e;font-size:13px;">
         <b>Warnings:</b><br>${sched.warnings.map(w => `• ${w}`).join('<br>')}
       </div>` : '';

  const rows = sched.data.slice(0, 200).map(s =>
    `<tr><td>${s.name}</td><td>${s.dateStr}</td><td>${s.store}</td><td>${s.shiftType}</td>
     <td class="num">H${s.half}</td><td class="num">${s.day}</td></tr>`
  ).join('');

  const truncNote = sched.data.length > 200
    ? `<p style="color:#64748b;margin-top:8px;font-size:12px;">Showing first 200 of ${sched.data.length}</p>` : '';

  const body = `
    ${warnHtml}
    <table>
      <thead><tr><th>Employee</th><th>Date</th><th>Store</th><th>Shift Type</th><th>Half</th><th>Day</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${truncNote}`;

  return panel(1, 'Schedule Parse', hasWarn ? 'warn' : 'ok',
    `${sched.count} shifts (H1: ${sched.h1Count}, H2: ${sched.h2Count})`, body);
}

function renderMatchingPanel(matching, bonuses, paid) {
  const hasErr = matching.unmatchedCount > 0;

  const unmatchedHtml = hasErr ? `
    <div style="margin-bottom:16px;">
      <b style="color:#b91c1c">Not found in database (${matching.unmatchedCount}):</b>
      <table style="margin-top:8px;">
        <thead><tr><th>Employee</th><th>Date</th><th>Store</th><th>Reason</th></tr></thead>
        <tbody>
          ${matching.unmatched.map(s =>
            `<tr class="err-row"><td>${s.name}</td><td>${s.dateStr}</td><td>${s.store}</td><td>${s.error}</td></tr>`
          ).join('')}
        </tbody>
      </table>
    </div>` : '';

  const bonusRows = bonuses.data.map(b =>
    `<tr><td>${b.name}</td><td>${b.type}</td><td class="num">${fmt(b.amount)}</td><td>${b.comment}</td></tr>`
  ).join('');

  const paidRows = paid.data.map(p =>
    `<tr><td>${p.name}</td><td>${p.store}</td><td class="num">${fmt(p.amount)}</td><td>${p.half}</td></tr>`
  ).join('');

  const body = `
    ${unmatchedHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <div>
        <b>Bonuses / Penalties (${bonuses.count})</b>
        <table style="margin-top:8px;">
          <thead><tr><th>Employee</th><th>Type</th><th>Amount</th><th>Comment</th></tr></thead>
          <tbody>${bonusRows || '<tr><td colspan="4" style="color:#94a3b8">—</td></tr>'}</tbody>
        </table>
      </div>
      <div>
        <b>Already Paid (${paid.count})</b>
        <table style="margin-top:8px;">
          <thead><tr><th>Employee</th><th>Store</th><th>Amount</th><th>Half</th></tr></thead>
          <tbody>${paidRows || '<tr><td colspan="4" style="color:#94a3b8">—</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;

  return panel(2, 'Data Matching', hasErr ? 'err' : 'ok',
    `${matching.totalEmployees} employees in DB, ${matching.unmatchedCount} unmatched`, body);
}

function renderH1Panel(summaries) {
  const totalBase    = summaries.reduce((s, e) => s + e.baseH1, 0);
  const totalBonus   = summaries.reduce((s, e) => s + e.bonusTotal, 0);
  const totalPenalty = summaries.reduce((s, e) => s + e.penaltyTotal, 0);
  const totalPay     = summaries.reduce((s, e) => s + e.toPayH1, 0);

  const rows = summaries.map(e => `
    <tr>
      <td>${e.name}</td>
      <td>${e.preferableStore}</td>
      <td>${e.role}</td>
      <td class="num">${e.halfShiftsH1}</td>
      <td class="num">${e.fullShiftsH1}</td>
      <td class="num">${e.helperShiftsH1}</td>
      <td class="num">${fmt(e.baseH1)}</td>
      <td class="num">${fmt(e.residualH1)}</td>
      <td class="num ${e.bonusTotal ? 'pos' : ''}">${e.bonusTotal ? '+'+fmt(e.bonusTotal) : '—'}</td>
      <td class="num ${e.penaltyTotal ? 'neg' : ''}">${e.penaltyTotal ? '-'+fmt(e.penaltyTotal) : '—'}</td>
      <td class="num"><b>${fmt(e.toPayH1)}</b></td>
    </tr>`).join('');

  const body = `
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Store</th><th>Role</th>
          <th>Half</th><th>Full</th><th>Helper</th>
          <th>Base H1</th><th>Residual H1</th><th>Bonus</th><th>Penalty</th>
          <th>TO PAY H1</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="6">TOTAL</td>
          <td class="num">${fmt(totalBase)}</td>
          <td></td>
          <td class="num pos">${totalBonus ? '+'+fmt(totalBonus) : '—'}</td>
          <td class="num neg">${totalPenalty ? '-'+fmt(totalPenalty) : '—'}</td>
          <td class="num">${fmt(totalPay)}</td>
        </tr>
      </tfoot>
    </table>`;

  return panel(3, 'First Half (days 1–15)', 'ok',
    `To pay: ${fmt(totalPay)}`, body);
}

function renderH2Panel(summaries) {
  const totalH2   = summaries.reduce((s, e) => s + e.toPayH2, 0);
  const totalOver = summaries.reduce((s, e) => s + e.overpayment, 0);

  const rows = summaries.map(e => `
    <tr class="${e.overpayment ? 'warn-row' : ''}">
      <td>${e.name}</td>
      <td>${e.preferableStore}</td>
      <td class="num">${fmt(e.baseH2)}</td>
      <td class="num">${fmt(e.residualH2)}</td>
      <td class="num">${fmt(e.residualH1)}</td>
      <td class="num">${fmt(e.monthlyEarned)}</td>
      <td class="num">${fmt(e.monthlyTotal)}</td>
      <td class="num">${fmt(e.paidAlready)}</td>
      <td class="num"><b>${fmt(e.toPayH2)}</b></td>
      <td class="num ${e.overpayment ? 'neg' : ''}">${e.overpayment ? fmt(e.overpayment) : '—'}</td>
    </tr>`).join('');

  const body = `
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Store</th>
          <th>Base H2</th><th>Residual H2</th><th>Residual H1</th>
          <th>Earned</th><th>Total (adj.)</th>
          <th>Already Paid</th><th>TO PAY H2</th><th>Overpayment</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="8">TOTAL</td>
          <td class="num">${fmt(totalH2)}</td>
          <td class="num ${totalOver ? 'neg' : ''}">${totalOver ? fmt(totalOver) : '—'}</td>
        </tr>
      </tfoot>
    </table>`;

  return panel(4, 'Second Half (days 16–end)', totalOver ? 'warn' : 'ok',
    `To pay: ${fmt(totalH2)}${totalOver ? ` · Overpayment: ${fmt(totalOver)}` : ''}`, body);
}

function renderVerificationPanel(verification) {
  const { rows, totals } = verification;
  const hasDiff = totals.diff !== 0;

  const tableRows = rows.map(r => `
    <tr class="${r.diff !== 0 ? 'warn-row' : ''}">
      <td>${r.store}</td>
      <td class="num">${fmt(r.scheduleCost)}</td>
      <td class="num">${fmt(r.employeeCost)}</td>
      <td class="num">${fmtDiff(r.diff)}</td>
    </tr>`).join('');

  const body = `
    <p style="margin-bottom:12px;font-size:13px;color:#475569;">
      <b>By schedule</b> — shift rates × shifts worked per store.<br>
      <b>By employee</b> — total pay per employee grouped by their home store.<br>
      Differences arise from bonuses/penalties and employees working outside their home store.
    </p>
    <table>
      <thead>
        <tr><th>Store</th><th>By Schedule</th><th>By Employee</th><th>Diff</th></tr>
      </thead>
      <tbody>${tableRows}</tbody>
      <tfoot>
        <tr class="total-row">
          <td>TOTAL</td>
          <td class="num">${fmt(totals.scheduleCost)}</td>
          <td class="num">${fmt(totals.employeeCost)}</td>
          <td class="num">${fmtDiff(totals.diff)}</td>
        </tr>
      </tfoot>
    </table>`;

  return panel(5, 'Store Verification', hasDiff ? 'warn' : 'ok',
    `Schedule: ${fmt(totals.scheduleCost)} · Employees: ${fmt(totals.employeeCost)}`, body);
}
</script>
</body>
</html>

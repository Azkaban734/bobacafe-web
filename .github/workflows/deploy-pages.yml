name: Deploy Website and Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: schedule-app/package-lock.json

      - name: Install and Build React App
        run: |
          cd schedule-app
          npm ci
          npm run build

      - name: Mint Databricks Embedded Dashboard Token
        id: databricks_token
        env:
          CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          WORKSPACE=https://dbc-d5bd17fc-eaf4.cloud.databricks.com
          DASHBOARD_ID=01f14724493017eb83de2e8f2f33b5dc

          # Step 1: all-apis OAuth token
          OAUTH_TOKEN=$(curl -sf -X POST "${WORKSPACE}/oidc/v1/token" \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -d "grant_type=client_credentials&scope=all-apis" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Step 2: fetch authorization_details scoped to this dashboard
          TOKEN_INFO=$(curl -sf \
            "${WORKSPACE}/api/2.0/lakeview/dashboards/${DASHBOARD_ID}/published/tokeninfo?external_viewer_id=internal&external_value=internal" \
            -H "Authorization: Bearer ${OAUTH_TOKEN}")

          # Log tokeninfo keys for debugging (no secrets exposed)
          echo "$TOKEN_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print('tokeninfo keys:', list(d.keys()))"

          # Step 3: exchange authorization_details for embedded token
          cat > /tmp/mint_token.py << 'PYEOF'
          import os, json, base64, urllib.parse, urllib.request, sys
          info   = json.loads(os.environ["TOKEN_INFO"])
          print("tokeninfo keys:", list(info.keys()), file=sys.stderr)

          params = dict(info)
          auth   = params.pop("authorization_details", None)
          # use token_endpoint from tokeninfo if provided, else fall back
          endpoint = params.pop("token_endpoint", f"{os.environ['WORKSPACE']}/oidc/v1/token")
          params["grant_type"]            = "client_credentials"
          params["authorization_details"] = json.dumps(auth)

          basic = base64.b64encode(
              f"{os.environ['CLIENT_ID']}:{os.environ['CLIENT_SECRET']}".encode()
          ).decode()
          body = urllib.parse.urlencode(params).encode()
          req  = urllib.request.Request(
              endpoint,
              data=body,
              headers={"Content-Type": "application/x-www-form-urlencoded",
                       "Authorization": f"Basic {basic}"}
          )
          try:
              resp = urllib.request.urlopen(req)
              print(json.loads(resp.read())["access_token"])
          except urllib.error.HTTPError as e:
              print("HTTP", e.code, e.read().decode(), file=sys.stderr)
              sys.exit(1)
          PYEOF

          SCOPED=$(TOKEN_INFO="$TOKEN_INFO" WORKSPACE="$WORKSPACE" \
            python3 /tmp/mint_token.py)
          echo "::add-mask::$SCOPED"
          echo "token=$SCOPED" >> "$GITHUB_OUTPUT"

      - name: Prepare Deployment Artifact
        env:
          DATABRICKS_TOKEN: ${{ steps.databricks_token.outputs.token }}
        run: |
          # 1. Create output directories
          mkdir -p deploy/internal/schedule deploy/internal/reports

          # 2. Public site root
          cp index.html deploy/index.html

          # 3. Internal dashboard + static pages
          cp internal/index.html       deploy/internal/index.html
          cp internal/faq.html         deploy/internal/faq.html
          cp internal/dashboard.html   deploy/internal/dashboard.html
          sed -i "s|YOUR_DATABRICKS_TOKEN_HERE|${DATABRICKS_TOKEN}|g" deploy/internal/dashboard.html

          # 4. Fresh React build → internal/schedule
          cp -r schedule-app/build/* deploy/internal/schedule/

          # 5. Reports
          cp -r internal/reports/. deploy/internal/reports/

          # 6. Prevent Jekyll from ignoring underscore files
          touch deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
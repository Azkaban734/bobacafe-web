name: Deploy Website and Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: schedule-app/package-lock.json

      - name: Install and Build React App
        run: |
          cd schedule-app
          npm ci
          npm run build

      - name: Mint Databricks Embedded Dashboard Token
        id: databricks_token
        env:
          CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          # Step 1: get service principal OAuth token
          OAUTH=$(curl -sf -X POST \
            https://dbc-d5bd17fc-eaf4.cloud.databricks.com/oidc/v1/token \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -d "grant_type=client_credentials&scope=all-apis")
          OAUTH_TOKEN=$(echo "$OAUTH" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Step 2: exchange for a dashboard-scoped embedded token
          EMBED=$(curl -sf -X POST \
            "https://dbc-d5bd17fc-eaf4.cloud.databricks.com/api/2.0/lakeview/dashboards/01f14724493017eb83de2e8f2f33b5dc/published/credentials" \
            -H "Authorization: Bearer ${OAUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')
          TOKEN=$(echo "$EMBED" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Prepare Deployment Artifact
        env:
          DATABRICKS_TOKEN: ${{ steps.databricks_token.outputs.token }}
        run: |
          # 1. Create output directories
          mkdir -p deploy/internal/schedule deploy/internal/reports

          # 2. Public site root
          cp index.html deploy/index.html

          # 3. Internal dashboard + static pages
          cp internal/index.html       deploy/internal/index.html
          cp internal/faq.html         deploy/internal/faq.html
          cp internal/dashboard.html   deploy/internal/dashboard.html
          sed -i "s|YOUR_DATABRICKS_TOKEN_HERE|${DATABRICKS_TOKEN}|g" deploy/internal/dashboard.html

          # 4. Fresh React build → internal/schedule
          cp -r schedule-app/build/* deploy/internal/schedule/

          # 5. Reports
          cp -r internal/reports/. deploy/internal/reports/

          # 6. Prevent Jekyll from ignoring underscore files
          touch deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
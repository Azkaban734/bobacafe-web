<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчёты — Боба Кролик</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f8f9fa;
            --surface:   #ffffff;
            --border:    #dadce0;
            --text-1:    #202124;
            --text-2:    #5f6368;
            --text-3:    #80868b;
            --accent:    #8d6e63;
            --accent-bg: #f4ede9;
            --shadow-md: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            font-size: 16px;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-back:hover { text-decoration: underline; }

        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-1);
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .page-sub {
            font-size: 16px;
            color: var(--text-2);
            margin-bottom: 40px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
        }

        .report-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .report-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .report-item:last-child { border-bottom: none; }
        .report-item:hover { background: #f8f9fa; }

        .report-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .report-info { flex: 1; }

        .report-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-1);
        }

        .report-date {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .report-arrow {
            color: var(--text-3);
            font-size: 18px;
            font-weight: 300;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-3);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .page { padding: 32px 16px 60px; }
            .page-title { font-size: 26px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/internal/" class="nav-back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Портал
    </a>
    <span class="nav-title">Отчёты</span>
    <div style="width:72px"></div>
</nav>

<div class="page">
    <h1 class="page-title">Отчёты</h1>
    <p class="page-sub">Внутренняя аналитика — обновляется автоматически</p>

    <div class="section-label">Еженедельные</div>
    <div class="report-list">
        <a href="2026-04-20_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">20 апреля 2026</div>
            </div>
            <span class="report-arrow">›</span>
        </a>
        <a href="2026-04-13_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">13 апреля 2026</div>
            </div>
            <span class="report-arrow">›</span>
        </a>
        <a href="2026-04-06_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">6 апреля 2026</div>
            </div>
            <span class="report-arrow">›</span>
        </a>
    </div>

    <div class="section-label">Ежемесячные</div>
    <div class="report-list">
        <a href="2026-03_product_health.html" class="report-item">
            <div class="report-icon">📊</div>
            <div class="report-info">
                <div class="report-name">Product Health</div>
                <div class="report-date">Март 2026</div>
            </div>
            <span class="report-arrow">›</span>
        </a>
    </div>
</div>

<footer>
    <a href="/internal/">← Внутренний портал</a>
</footer>

</body>
</html>

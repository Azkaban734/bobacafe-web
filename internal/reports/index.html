<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчёты — Боба Кролик</title>
    <style>
        :root {
            --bg:           #f5f5f7;
            --surface:      #ffffff;
            --border:       rgba(0,0,0,0.08);
            --text-1:       #1d1d1f;
            --text-2:       #6e6e73;
            --text-3:       #86868b;
            --accent:       #8d6e63;
            --accent-light: rgba(141,110,99,0.10);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .nav-back:hover { opacity: 0.7; }

        .nav-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-1);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 2.5rem 1.25rem 4rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.3rem;
        }

        .page-sub {
            font-size: 0.9rem;
            color: var(--text-2);
            margin-bottom: 2rem;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 0 0.25rem;
            margin-bottom: 0.6rem;
        }

        /* iOS-style table list */
        .report-list {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px var(--border);
            overflow: hidden;
        }

        .report-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.85rem 1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .report-item:last-child { border-bottom: none; }
        .report-item:hover { background: rgba(0,0,0,0.02); }
        .report-item:active { background: rgba(0,0,0,0.04); }

        .report-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            background: var(--accent-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .report-info { flex: 1; min-width: 0; }

        .report-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .report-date {
            font-size: 0.75rem;
            color: var(--text-3);
            margin-top: 0.1rem;
        }

        .report-chevron {
            color: var(--text-3);
            flex-shrink: 0;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-3);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <a href="/internal/" class="nav-back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        &nbsp;Портал
    </a>
    <span class="nav-title">Отчёты</span>
</nav>

<div class="page">
    <h1 class="page-title">Отчёты</h1>
    <p class="page-sub">Внутренняя аналитика — обновляется автоматически</p>

    <div class="section-label">Еженедельные</div>
    <div class="report-list">
        <a href="2026-04-20_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">20 апреля 2026</div>
            </div>
            <svg class="report-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <a href="2026-04-13_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">13 апреля 2026</div>
            </div>
            <svg class="report-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <a href="2026-04-06_weekly_report.html" class="report-item">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-name">Еженедельный отчёт</div>
                <div class="report-date">6 апреля 2026</div>
            </div>
            <svg class="report-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>

    <div class="section-label" style="margin-top:1.5rem">Ежемесячные</div>
    <div class="report-list">
        <a href="2026-03_product_health.html" class="report-item">
            <div class="report-icon">📊</div>
            <div class="report-info">
                <div class="report-name">Product Health</div>
                <div class="report-date">Март 2026</div>
            </div>
            <svg class="report-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>
</div>

<footer>
    <a href="/internal/">← Внутренний портал</a>
</footer>

</body>
</html>

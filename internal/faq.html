<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ — Боба Кролик</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f8f9fa;
            --surface:   #ffffff;
            --border:    #dadce0;
            --text-1:    #202124;
            --text-2:    #5f6368;
            --text-3:    #80868b;
            --accent:    #8d6e63;
            --accent-bg: #f4ede9;
            --shadow-md: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            font-size: 16px;
        }

        /* Nav */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-back:hover { text-decoration: underline; }

        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-1);
        }

        /* Search area */
        .search-section {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
        }

        .search-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .search-wrap {
            position: relative;
            max-width: 640px;
            margin-bottom: 14px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
        }
        #search {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 46px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 16px;
            font-family: 'Roboto', Arial, sans-serif;
            color: var(--text-1);
            background: var(--bg);
            outline: none;
            transition: box-shadow 0.2s, border-color 0.2s, background 0.2s;
        }
        #search:focus {
            background: var(--surface);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }
        #search::placeholder { color: var(--text-3); }

        .cat-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-btn {
            height: 36px;
            padding: 0 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Roboto', Arial, sans-serif;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .cat-btn:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* Content */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        #count {
            font-size: 14px;
            color: var(--text-3);
            margin-bottom: 24px;
        }

        /* Category group */
        .cat-group { margin-bottom: 40px; }

        .cat-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-count {
            background: #e8eaed;
            color: var(--text-2);
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 12px;
        }

        .sub-group { margin-bottom: 8px; }

        .sub-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 6px;
        }

        /* FAQ item */
        .faq-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .faq-card:hover { box-shadow: 0 1px 3px rgba(60,64,67,.2); }

        .faq-q {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
            font-family: 'Roboto', Arial, sans-serif;
            transition: background 0.1s;
        }
        .faq-q:hover { background: #f8f9fa; }

        .faq-chevron {
            flex-shrink: 0;
            margin-top: 3px;
            color: var(--text-3);
            transition: transform 0.22s ease, color 0.22s;
        }
        .faq-card.open .faq-chevron { transform: rotate(180deg); color: var(--accent); }

        .faq-a {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.28s ease, opacity 0.28s ease, padding 0.28s ease;
            font-size: 15px;
            color: var(--text-2);
            line-height: 1.6;
            padding: 0 20px;
            border-top: 1px solid transparent;
        }
        .faq-card.open .faq-a {
            max-height: 600px;
            opacity: 1;
            padding: 14px 20px 18px;
            border-top-color: var(--border);
        }

        mark { background: #fef08a; border-radius: 2px; padding: 0 2px; color: inherit; }

        /* States */
        #loading { padding: 64px 0; color: var(--text-3); font-size: 15px; text-align: center; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e8eaed;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #empty { display: none; padding: 64px 0; text-align: center; color: var(--text-3); font-size: 15px; }
        #empty .icon { font-size: 40px; margin-bottom: 12px; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-3);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .search-section { padding: 16px; }
            .page { padding: 24px 16px 60px; }
            .nav-title { font-size: 15px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/internal/" class="nav-back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Портал
    </a>
    <span class="nav-title">База знаний</span>
    <div style="width:72px"></div>
</nav>

<div class="search-section">
    <div class="search-inner">
        <div class="search-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input id="search" type="search" placeholder="Поиск по вопросам и ответам…" autocomplete="off">
        </div>
        <div class="cat-filters" id="cat-filters"></div>
    </div>
</div>

<div class="page">
    <div id="loading"><div class="spinner"></div><p>Загрузка данных…</p></div>
    <div id="count"></div>
    <div id="faq-root"></div>
    <div id="empty">
        <div class="icon">🔍</div>
        <p>Ничего не найдено. Попробуйте изменить запрос.</p>
    </div>
</div>

<footer>
    Данные из <a href="https://docs.google.com/spreadsheets" target="_blank">Google Sheets</a> · обновляются автоматически
</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGzCgnaKW7kmE-KygwX_FUZ2EX8upY7bQ1JnXzaxpUI3s39FYJJyi14hBq0GzIJc3Kkgp9tvwwjhLZ/pub?output=csv';

let allItems = [], activeCategory = 'all';

function parseCSV(text) {
    const rows = [];
    for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const cells = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
            else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
            else cur += ch;
        }
        cells.push(cur);
        rows.push(cells);
    }
    return rows;
}

function stripCite(t) { return t.replace(/\s*\[cite:[^\]]*\]/g, '').trim(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hi(text, term) {
    if (!term) return esc(text);
    return esc(text).replace(new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

async function loadData() {
    const rows = parseCSV(await (await fetch(CSV_URL)).text());
    if (rows.length < 2) return [];
    const h = rows[0];
    const ci = h.findIndex(x => x.trim() === 'Категория');
    const si = h.findIndex(x => x.trim() === 'Субкатегория');
    const qi = h.findIndex(x => x.trim() === 'Вопрос');
    const ai = h.findIndex(x => x.trim() === 'Ответ');
    return rows.slice(1).filter(r => r[qi] && r[ai]).map(r => ({
        category: (r[ci]||'').trim(), sub: (r[si]||'').trim(),
        q: stripCite((r[qi]||'').trim()), a: stripCite((r[ai]||'').trim()),
    }));
}

function plural(n, one, few, many) {
    const m10 = n%10, m100 = n%100;
    if (m10===1 && m100!==11) return `${n} ${one}`;
    if (m10>=2 && m10<=4 && (m100<10||m100>=20)) return `${n} ${few}`;
    return `${n} ${many}`;
}

function render(items, term) {
    const root = document.getElementById('faq-root');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    if (!items.length) { root.innerHTML = ''; empty.style.display = 'block'; count.textContent = ''; return; }
    empty.style.display = 'none';
    count.textContent = plural(items.length, 'вопрос', 'вопроса', 'вопросов');

    const cats = {};
    for (const item of items) {
        if (!cats[item.category]) cats[item.category] = {};
        if (!cats[item.category][item.sub]) cats[item.category][item.sub] = [];
        cats[item.category][item.sub].push(item);
    }

    root.innerHTML = Object.entries(cats).map(([cat, subs]) => {
        const total = Object.values(subs).reduce((s,a) => s+a.length, 0);
        const subsHtml = Object.entries(subs).map(([sub, qas]) => `
            <div class="sub-group">
                ${sub ? `<div class="sub-title">${esc(sub)}</div>` : ''}
                ${qas.map(item => `
                    <div class="faq-card">
                        <button class="faq-q" onclick="toggle(this)">
                            <span>${hi(item.q, term)}</span>
                            <svg class="faq-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <div class="faq-a">${hi(item.a, term)}</div>
                    </div>`).join('')}
            </div>`).join('');
        return `
            <div class="cat-group">
                <div class="cat-title">${esc(cat)}<span class="cat-count">${total}</span></div>
                ${subsHtml}
            </div>`;
    }).join('');
}

function toggle(btn) { btn.closest('.faq-card').classList.toggle('open'); }

function applyFilters() {
    const term = document.getElementById('search').value.trim().toLowerCase();
    let filtered = activeCategory === 'all' ? allItems : allItems.filter(i => i.category === activeCategory);
    if (term) filtered = filtered.filter(i =>
        i.q.toLowerCase().includes(term) || i.a.toLowerCase().includes(term) ||
        i.category.toLowerCase().includes(term) || i.sub.toLowerCase().includes(term));
    render(filtered, term);
}

function buildCatFilters(items) {
    const cats = ['all', ...new Set(items.map(i => i.category).filter(Boolean))];
    const container = document.getElementById('cat-filters');
    container.innerHTML = cats.map(cat =>
        `<button class="cat-btn ${cat==='all'?'active':''}" data-cat="${cat}">${esc(cat==='all'?'Все':cat)}</button>`
    ).join('');
    container.addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        activeCategory = btn.dataset.cat;
        container.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b===btn));
        applyFilters();
    });
}

(async () => {
    try {
        allItems = await loadData();
        document.getElementById('loading').style.display = 'none';
        buildCatFilters(allItems);
        render(allItems, '');
        document.getElementById('search').addEventListener('input', applyFilters);
    } catch (err) {
        document.getElementById('loading').innerHTML = `<p style="color:#d93025">Ошибка загрузки: ${esc(String(err))}</p>`;
    }
})();
</script>
</body>
</html>

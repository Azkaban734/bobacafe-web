<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ — Боба Кролик</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f8f9fa;
            --surface:   #ffffff;
            --border:    #dadce0;
            --text-1:    #202124;
            --text-2:    #5f6368;
            --text-3:    #80868b;
            --accent:    #8d6e63;
            --accent-bg: #f4ede9;
            --nav-h:     64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            font-size: 16px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ─────────────────────────────────────────────────────── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: var(--nav-h);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-back:hover { text-decoration: underline; }

        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-1);
        }

        /* ── Two-panel shell ─────────────────────────────────────────────── */
        .shell {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ── Sidebar ─────────────────────────────────────────────────────── */
        .sidebar {
            width: 248px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-heading {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 8px 20px 10px;
        }

        .side-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px 10px 20px;
            margin: 1px 8px 1px 0;
            border-radius: 0 24px 24px 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-2);
            transition: background 0.12s, color 0.12s;
            user-select: none;
        }
        .side-item:hover { background: #f1f3f4; color: var(--text-1); }
        .side-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            font-weight: 700;
        }

        .side-count {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-3);
            background: #f1f3f4;
            border-radius: 10px;
            padding: 1px 8px;
            min-width: 26px;
            text-align: center;
            flex-shrink: 0;
        }
        .side-item.active .side-count {
            background: rgba(141,110,99,0.15);
            color: var(--accent);
        }

        /* ── Main panel ──────────────────────────────────────────────────── */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Search bar — fixed at top of panel */
        .search-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            flex-shrink: 0;
        }

        .search-wrap {
            position: relative;
            max-width: 560px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
        }
        #search {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 46px;
            border: 1px solid var(--border);
            border-radius: 22px;
            font-size: 15px;
            font-family: 'Roboto', Arial, sans-serif;
            color: var(--text-1);
            background: var(--bg);
            outline: none;
            transition: box-shadow 0.2s, border-color 0.2s, background 0.15s;
        }
        #search:focus {
            background: var(--surface);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }
        #search::placeholder { color: var(--text-3); }

        /* Scrollable FAQ content */
        .faq-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 60px;
        }

        /* Panel header */
        .panel-header {
            margin-bottom: 20px;
        }
        .panel-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }
        #count {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 4px;
        }

        /* Category group (shown when All is selected) */
        .cat-group { margin-bottom: 36px; }

        .cat-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-count {
            background: #e8eaed;
            color: var(--text-2);
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 12px;
        }

        /* Subcategory */
        .sub-group { margin-bottom: 8px; }
        .sub-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin: 12px 0 6px;
        }

        /* FAQ item */
        .faq-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .faq-card:hover { border-color: #c5c7cb; }

        .faq-q {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
            font-family: 'Roboto', Arial, sans-serif;
            transition: background 0.1s;
        }
        .faq-q:hover { background: #fafafa; }

        .faq-chevron {
            flex-shrink: 0;
            margin-top: 3px;
            color: var(--text-3);
            transition: transform 0.22s ease, color 0.22s;
        }
        .faq-card.open .faq-chevron { transform: rotate(180deg); color: var(--accent); }

        .faq-a {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.28s ease, opacity 0.25s ease, padding 0.28s ease;
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.65;
            padding: 0 18px;
            border-top: 1px solid transparent;
        }
        .faq-card.open .faq-a {
            max-height: 600px;
            opacity: 1;
            padding: 12px 18px 16px;
            border-top-color: var(--border);
        }

        mark { background: #fef08a; border-radius: 2px; padding: 0 2px; color: inherit; }

        /* States */
        #loading { padding: 60px 0; text-align: center; color: var(--text-3); font-size: 15px; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #e8eaed;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #empty { display: none; padding: 60px 0; text-align: center; color: var(--text-3); }
        #empty .icon { font-size: 36px; margin-bottom: 12px; }
        #empty p { font-size: 15px; }

        /* ── Mobile: collapse sidebar to top chips ───────────────────────── */
        .mobile-cats { display: none; }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .shell { flex-direction: column; }
            .sidebar { display: none; }
            .main { overflow: visible; }
            .faq-scroll { overflow: visible; padding: 16px 16px 48px; }
            .search-bar { padding: 12px 16px; }
            nav { padding: 0 16px; }

            .mobile-cats {
                display: flex;
                gap: 8px;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 10px 16px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .mobile-cats::-webkit-scrollbar { display: none; }

            .mob-btn {
                flex-shrink: 0;
                height: 34px;
                padding: 0 14px;
                border-radius: 17px;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text-2);
                font-size: 13px;
                font-weight: 500;
                font-family: 'Roboto', Arial, sans-serif;
                cursor: pointer;
                white-space: nowrap;
                transition: background 0.12s, border-color 0.12s, color 0.12s;
            }
            .mob-btn:hover { background: var(--accent-bg); }
            .mob-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/internal/" class="nav-back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Портал
    </a>
    <span class="nav-title">База знаний</span>
    <div style="width:72px"></div>
</nav>

<!-- Mobile category chips (hidden on desktop) -->
<div class="mobile-cats" id="mobile-cats"></div>

<div class="shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-heading">Категории</div>
        <div id="side-items"></div>
    </aside>

    <!-- Main panel -->
    <div class="main">
        <div class="search-bar">
            <div class="search-wrap">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input id="search" type="search" placeholder="Поиск…" autocomplete="off">
            </div>
        </div>

        <div class="faq-scroll">
            <div id="loading"><div class="spinner"></div><p>Загрузка данных…</p></div>
            <div class="panel-header" id="panel-header" style="display:none">
                <div class="panel-title" id="panel-title"></div>
                <div id="count"></div>
            </div>
            <div id="faq-root"></div>
            <div id="empty">
                <div class="icon">🔍</div>
                <p>Ничего не найдено. Попробуйте изменить запрос.</p>
            </div>
        </div>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGzCgnaKW7kmE-KygwX_FUZ2EX8upY7bQ1JnXzaxpUI3s39FYJJyi14hBq0GzIJc3Kkgp9tvwwjhLZ/pub?output=csv';

let allItems = [], activeCategory = 'all', counts = {};

function parseCSV(text) {
    const rows = [];
    for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const cells = []; let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
            else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
            else cur += ch;
        }
        cells.push(cur); rows.push(cells);
    }
    return rows;
}

function stripCite(t) { return t.replace(/\s*\[cite:[^\]]*\]/g, '').trim(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hi(text, term) {
    if (!term) return esc(text);
    return esc(text).replace(new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}
function plural(n, one, few, many) {
    const m10=n%10, m100=n%100;
    if (m10===1&&m100!==11) return `${n} ${one}`;
    if (m10>=2&&m10<=4&&(m100<10||m100>=20)) return `${n} ${few}`;
    return `${n} ${many}`;
}

async function loadData() {
    const rows = parseCSV(await (await fetch(CSV_URL)).text());
    if (rows.length < 2) return [];
    const h=rows[0];
    const ci=h.findIndex(x=>x.trim()==='Категория'), si=h.findIndex(x=>x.trim()==='Субкатегория');
    const qi=h.findIndex(x=>x.trim()==='Вопрос'),     ai=h.findIndex(x=>x.trim()==='Ответ');
    return rows.slice(1).filter(r=>r[qi]&&r[ai]).map(r=>({
        category:(r[ci]||'').trim(), sub:(r[si]||'').trim(),
        q:stripCite((r[qi]||'').trim()), a:stripCite((r[ai]||'').trim()),
    }));
}

function buildSidebar(items) {
    const cats = [...new Set(items.map(i=>i.category).filter(Boolean))];
    counts = { all: items.length };
    cats.forEach(c => counts[c] = items.filter(i=>i.category===c).length);

    const container = document.getElementById('side-items');
    container.innerHTML = [['all','Все'], ...cats.map(c=>[c,c])].map(([key,label]) => `
        <div class="side-item ${key==='all'?'active':''}" data-cat="${esc(key)}">
            <span>${esc(label)}</span>
            <span class="side-count">${counts[key]}</span>
        </div>`).join('');

    container.addEventListener('click', e => {
        const item = e.target.closest('.side-item');
        if (!item) return;
        setCategory(item.dataset.cat);
    });

    // Mobile chips
    const mob = document.getElementById('mobile-cats');
    mob.innerHTML = [['all','Все'], ...cats.map(c=>[c,c])].map(([key,label]) =>
        `<button class="mob-btn ${key==='all'?'active':''}" data-cat="${esc(key)}">${esc(label)}</button>`
    ).join('');
    mob.addEventListener('click', e => {
        const btn = e.target.closest('.mob-btn');
        if (!btn) return;
        setCategory(btn.dataset.cat);
    });
}

function setCategory(cat) {
    activeCategory = cat;
    // Update sidebar
    document.querySelectorAll('.side-item').forEach(el =>
        el.classList.toggle('active', el.dataset.cat === cat));
    // Update mobile chips
    document.querySelectorAll('.mob-btn').forEach(el =>
        el.classList.toggle('active', el.dataset.cat === cat));
    applyFilters();
}

function renderItems(items, term) {
    const subs = {};
    for (const item of items) {
        if (!subs[item.sub]) subs[item.sub] = [];
        subs[item.sub].push(item);
    }
    return Object.entries(subs).map(([sub, qas]) => `
        <div class="sub-group">
            ${sub ? `<div class="sub-title">${esc(sub)}</div>` : ''}
            ${qas.map(item => `
                <div class="faq-card">
                    <button class="faq-q" onclick="toggle(this)">
                        <span>${hi(item.q, term)}</span>
                        <svg class="faq-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <div class="faq-a">${hi(item.a, term)}</div>
                </div>`).join('')}
        </div>`).join('');
}

function render(items, term) {
    const root  = document.getElementById('faq-root');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const header = document.getElementById('panel-header');
    const title  = document.getElementById('panel-title');

    // Update sidebar counts based on current search
    document.querySelectorAll('.side-item').forEach(el => {
        const cat = el.dataset.cat;
        const n = cat === 'all' ? items.length : items.filter(i=>i.category===cat).length;
        el.querySelector('.side-count').textContent = n;
    });

    if (!items.length) {
        root.innerHTML = ''; empty.style.display = 'block';
        header.style.display = 'none'; return;
    }
    empty.style.display = 'none';
    header.style.display = 'block';

    const catLabel = activeCategory === 'all' ? 'Все вопросы' : activeCategory;
    title.textContent = catLabel;
    count.textContent = plural(items.length, 'вопрос', 'вопроса', 'вопросов');

    if (activeCategory === 'all') {
        const cats = {};
        for (const item of items) {
            if (!cats[item.category]) cats[item.category] = [];
            cats[item.category].push(item);
        }
        root.innerHTML = Object.entries(cats).map(([cat, catItems]) => `
            <div class="cat-group">
                <div class="cat-title">${esc(cat)}<span class="cat-count">${catItems.length}</span></div>
                ${renderItems(catItems, term)}
            </div>`).join('');
    } else {
        root.innerHTML = renderItems(items, term);
    }
}

function toggle(btn) { btn.closest('.faq-card').classList.toggle('open'); }

function applyFilters() {
    const term = document.getElementById('search').value.trim().toLowerCase();
    let filtered = activeCategory === 'all' ? allItems : allItems.filter(i=>i.category===activeCategory);
    if (term) filtered = filtered.filter(i =>
        i.q.toLowerCase().includes(term) || i.a.toLowerCase().includes(term) ||
        i.category.toLowerCase().includes(term) || i.sub.toLowerCase().includes(term));
    render(filtered, term);
}

(async () => {
    try {
        allItems = await loadData();
        document.getElementById('loading').style.display = 'none';
        buildSidebar(allItems);
        render(allItems, '');
        document.getElementById('search').addEventListener('input', applyFilters);
    } catch (err) {
        document.getElementById('loading').innerHTML =
            `<p style="color:#d93025">Ошибка загрузки: ${esc(String(err))}</p>`;
    }
})();
</script>
</body>
</html>

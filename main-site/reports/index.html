<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports Boba Cafe</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #fdf6ec; color: #5d4037; margin: 0; padding: 40px; }
    h1   { font-size: 1.6em; margin-bottom: 0.25em; }
    p    { color: #8d6e63; margin-top: 0; }
    ul   { list-style: none; padding: 0; max-width: 600px; }
    li   { margin: 10px 0; }
    a    { color: #5d4037; text-decoration: none; border: 1px solid #d7ccc8;
           padding: 10px 16px; border-radius: 6px; display: inline-block;
           background: #fff; width: 100%; box-sizing: border-box; }
    a:hover { background: #8d6e63; color: #fff; border-color: #8d6e63; }
    #gate { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; max-width: 300px; margin-top: 20px; }
    #gate input { padding: 10px; border: 1px solid #d7ccc8; border-radius: 6px; font-size: 1em; width: 100%; box-sizing: border-box; }
    #gate button { padding: 10px 20px; background: #8d6e63; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; }
    #gate button:hover { background: #5d4037; }
    #error { color: #c62828; font-size: 0.9em; display: none; }
    #content { display: none; }
  </style>
</head>
<body>
  <h1>Boba Cafe Reports</h1>
  <div id="gate">
    <p style="margin:0;color:#8d6e63;">Enter password to access reports.</p>
    <input type="password" id="pw" placeholder="Password" />
    <button onclick="unlock()">Enter</button>
    <span id="error">Incorrect password.</span>
  </div>
  <div id="content">
    <p>Internal analytics updated automatically.</p>
    <ul>
        <li><a href="2026-04-13_weekly_report.html">2026 04 13 Weekly Report</a></li>
        <li><a href="2026-04-06_weekly_report.html">2026 04 06 Weekly Report</a></li>
        <li><a href="2026-03_product_health.html">2026 03 Product Health</a></li>
    </ul>
  </div>
  <script>
    function unlock() {
      if (document.getElementById('pw').value === '2233') {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') unlock();
    });
  </script>
</body>
</html>
